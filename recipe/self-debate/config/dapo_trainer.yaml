hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  gen_batch_size: ${data.train_batch_size}

reward_model:
  reward_manager: dapo
  overlong_buffer: 
    enable: False # We try to avoid forgetting to set enable
    len: 0
    penalty_factor: 0.0
    log: False

algorithm:
  filter_groups:
    _target_: verl.trainer.config.FilterGroupsConfig
    enable: False # We try to avoid forgetting to set enable
    metric: null # acc / score / seq_reward / seq_final_reward / ...
    max_num_gen_batches: 0 # Non-positive values mean no upper limit

trainer:
  project_name: verl-dapo

self_debate:
  enable_debate_training: True
  partner_mode: frequency # frequency | random
  debate_n: 4 # debate num generation per prompt
  num_debate_prompt: 0 # Non-positive values mean no limit
  train_debate_max_initial_response_length: 2048
  test_debate_max_initial_response_length: 8192
  enable_second_turn_eval: True
  second_turn_advantage: grpo

